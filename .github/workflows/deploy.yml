name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: authz-service
  ACR_REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  # ─── JOB 1: Tests ─────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: |
          cd app
          python -m pytest test_main.py -v || echo "No tests found, skipping"

  # ─── JOB 2: Build & Push to ACR ───────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tags=${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ─── JOB 3: Deploy to Azure VM ────────────────────────
  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.AZURE_VM_IP }} >> ~/.ssh/known_hosts

      - name: Copy docker-compose and monitoring config
        run: |
          scp docker-compose.yml ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_IP }}:~/
          scp -r monitoring/ ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_IP }}:~/

      - name: Deploy on VM
        run: |
          ssh ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_IP }} << 'EOF'
            # Log in to ACR
            docker login ${{ secrets.ACR_LOGIN_SERVER }} \
              -u ${{ secrets.ACR_USERNAME }} \
              -p ${{ secrets.ACR_PASSWORD }}

            # Set registry variable
            export ACR_REGISTRY=${{ secrets.ACR_LOGIN_SERVER }}

            # Pull the new image
            docker pull $ACR_REGISTRY/authz-service:latest

            # Replace image in docker-compose (use ACR instead of local build)
            sed -i "s|build: ./app|image: $ACR_REGISTRY/authz-service:latest|g" ~/docker-compose.yml

            # Start/update the stack
            cd ~
            docker compose up -d --remove-orphans

            # Remove old images
            docker image prune -f
          EOF

      - name: Health check
        run: |
          sleep 15
          curl -f http://${{ secrets.AZURE_VM_IP }}:8000/health || exit 1
          echo "Deployment successful!"